<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vento — Live Weather</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f3f6fb;
      --surface:   #ffffff;
      --border:    #e2e8f0;
      --accent:    #6366f1;
      --accent2:   #a855f7;
      --teal:      #14b8a6;
      --text:      #1e293b;
      --muted:     #64748b;
      --dim:       #cbd5e1;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2.5rem 1rem 5rem;
    }

    .app { width: 100%; max-width: 540px; }

    /* ── Header ── */
    .header { text-align: center; margin-bottom: 2.5rem; }
    .logo { display: inline-flex; align-items: center; gap: 11px; margin-bottom: 8px; }
    .logo-mark {
      position: relative;
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
    }
    .logo-mark i { font-size: 24px; color: var(--accent); }
    .logo-name {
      font-family: 'Poppins', sans-serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -1px;
      color: var(--text);
    }
    .logo-name span { color: var(--accent); }
    .logo-tagline { font-size: 13px; color: var(--muted); letter-spacing: 0.3px; }

    /* ── Search ── */
    .search-wrap {
      display: flex;
      gap: 8px;
      margin-bottom: 0.875rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 6px 6px 6px 16px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
    }
    .search-wrap input {
      flex: 1;
      background: transparent;
      border: none;
      padding: 8px 0;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      outline: none;
    }
    .search-wrap input::placeholder { color: var(--dim); }
    .search-wrap button {
      height: 42px;
      padding: 0 20px;
      border-radius: 10px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      transition: opacity 0.15s, transform 0.1s;
      flex-shrink: 0;
    }
    .search-wrap button:hover { opacity: 0.9; }
    .search-wrap button:active { transform: scale(0.97); }
    .search-wrap button:disabled { opacity: 0.55; cursor: not-allowed; }

    .error-msg {
      text-align: center;
      color: #dc2626;
      font-size: 13px;
      min-height: 20px;
      margin-bottom: 1rem;
    }

    /* ── Weather Card ── */
    .weather-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 1px 3px rgba(15,23,42,0.04);
    }

    .card-hero {
      padding: 2rem;
      background: linear-gradient(135deg, #eef2ff 0%, #f5f3ff 50%, #faf5ff 100%);
      position: relative;
      border-bottom: 1px solid var(--border);
    }

    .hero-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.25rem; }
    .location-block {}
    .city-name {
      font-family: 'Poppins', sans-serif;
      font-size: 26px; font-weight: 600;
      color: var(--text); line-height: 1.2;
    }
    .country-tag {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 12px; color: var(--muted);
      margin-top: 5px;
    }
    .country-tag i { font-size: 13px; }
    .date-time { font-size: 11px; color: var(--muted); opacity: 0.7; margin-top: 3px; }
    .weather-emoji { font-size: 64px; line-height: 1; }

    .temp-row { display: flex; align-items: flex-end; gap: 4px; margin-bottom: 0.4rem; }
    .temp-main {
      font-family: 'Poppins', sans-serif;
      font-size: 82px; font-weight: 600;
      color: var(--text); line-height: 1;
      letter-spacing: -3px;
    }
    .temp-deg { font-size: 30px; color: var(--muted); margin-bottom: 12px; }
    .condition { font-size: 16px; color: var(--text); text-transform: capitalize; margin-bottom: 6px; font-weight: 500; }
    .feels-row { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
    .feels-row .sep { color: var(--dim); }

    /* ── Stats grid ── */
    .card-stats { padding: 1.5rem; }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 1.25rem;
    }
    .stat {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1rem;
      position: relative;
    }
    .stat-icon {
      width: 30px; height: 30px;
      border-radius: 8px;
      background: #e0e7ff;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 10px;
    }
    .stat-icon i { font-size: 15px; color: var(--accent); }
    .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 4px; }
    .stat-value { font-family: 'Poppins', sans-serif; font-size: 20px; font-weight: 600; color: var(--text); line-height: 1; }
    .stat-unit { font-size: 11px; color: var(--muted); font-weight: 400; margin-left: 1px; }
    .stat-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }

    /* ── Extras ── */
    .rule { height: 1px; background: var(--border); margin-bottom: 1.25rem; }
    .extras-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .extra {
      display: flex; align-items: center; gap: 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 0.9rem 1rem;
    }
    .extra-icon {
      width: 34px; height: 34px;
      border-radius: 9px;
      background: #ccfbf1;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .extra-icon i { font-size: 17px; color: var(--teal); }
    .extra-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; }
    .extra-val { font-family: 'Poppins', sans-serif; font-size: 14px; font-weight: 600; color: var(--text); margin-top: 3px; }

    /* ── Placeholder ── */
    .placeholder { text-align: center; padding: 4rem 1rem; }
    .placeholder-icon {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: var(--bg);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.25rem;
    }
    .placeholder-icon i { font-size: 32px; color: var(--dim); }
    .placeholder p { font-size: 15px; color: var(--muted); }
    .placeholder small { display: block; font-size: 12px; color: var(--muted); opacity: 0.7; margin-top: 6px; }

    /* ── Spinner ── */
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive ── */
    @media (max-width: 460px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .temp-main { font-size: 64px; }
      .city-name { font-size: 22px; }
    }
  </style>
</head>
<body>

<div class="app">

  <div class="header">
    <div class="logo">
      <div class="logo-mark"><i class="ti ti-cloud-bolt"></i></div>
      <div class="logo-name">ven<span>to</span></div>
    </div>
    <div class="logo-tagline">Live weather for any place on Earth</div>
  </div>

  <div class="search-wrap">
    <i class="ti ti-map-pin" style="color:var(--dim);font-size:18px;flex-shrink:0;margin-top:1px;"></i>
    <input type="text" id="cityInput" placeholder="City name — e.g. Mumbai, Tokyo, London…" autocomplete="off" />
    <button id="searchBtn" onclick="fetchWeather()">
      <i class="ti ti-search"></i> Search
    </button>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div id="weatherResult">
    <div class="weather-card">
      <div class="placeholder">
        <div class="placeholder-icon"><i class="ti ti-world"></i></div>
        <p>Enter a city to get started</p>
        <small>Current conditions, wind, humidity, sunrise & more</small>
      </div>
    </div>
  </div>

</div>

<script>
  const API_KEY = '4f72f36f264839aa3d1f22b8024bfd83';

  document.getElementById('cityInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') fetchWeather();
  });

  function getEmoji(id, icon) {
    const night = icon && icon.endsWith('n');
    if (id >= 200 && id < 300) return '⛈️';
    if (id >= 300 && id < 400) return '🌦️';
    if (id >= 500 && id < 600) return id < 502 ? '🌧️' : '⛈️';
    if (id >= 600 && id < 700) return '❄️';
    if (id >= 700 && id < 800) return '🌫️';
    if (id === 800) return night ? '🌙' : '☀️';
    if (id === 801) return night ? '🌙' : '🌤️';
    if (id >= 802) return '☁️';
    return '🌡️';
  }

  function windDir(deg) {
    const d = ['N','NE','E','SE','S','SW','W','NW'];
    return d[Math.round(deg / 45) % 8];
  }

  function localTime(ts, off) {
    const d = new Date((ts + off) * 1000);
    return d.toUTCString().replace('GMT','').split(' ').slice(0,4).join(' ');
  }

  function sunTime(ts, off) {
    const d = new Date((ts + off) * 1000);
    const h = d.getUTCHours(), m = d.getUTCMinutes();
    return `${h % 12 || 12}:${String(m).padStart(2,'0')} ${h >= 12 ? 'PM' : 'AM'}`;
  }

  async function fetchWeather() {
    const city = document.getElementById('cityInput').value.trim();
    if (!city) return;

    const btn = document.getElementById('searchBtn');
    const err = document.getElementById('errorMsg');
    const result = document.getElementById('weatherResult');

    err.textContent = '';
    btn.innerHTML = '<span class="spinner"></span>';
    btn.disabled = true;

    try {
      const res = await fetch(
        `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=metric`
      );
      if (!res.ok) {
        const d = await res.json();
        throw new Error(d.message || 'City not found');
      }
      const d = await res.json();

      const emoji   = getEmoji(d.weather[0].id, d.weather[0].icon);
      const time    = localTime(d.dt, d.timezone);
      const sunrise = sunTime(d.sys.sunrise, d.timezone);
      const sunset  = sunTime(d.sys.sunset, d.timezone);
      const visKm   = d.visibility ? (d.visibility / 1000).toFixed(1) : 'N/A';
      const windKmh = Math.round(d.wind.speed * 3.6);
      const wDir    = d.wind.deg !== undefined ? windDir(d.wind.deg) : '';

      result.innerHTML = `
        <div class="weather-card">
          <div class="card-hero">
            <div class="hero-top">
              <div class="location-block">
                <div class="city-name">${d.name}</div>
                <div class="country-tag"><i class="ti ti-map-pin"></i>${d.sys.country}</div>
                <div class="date-time">${time}</div>
              </div>
              <div class="weather-emoji">${emoji}</div>
            </div>
            <div class="temp-row">
              <div class="temp-main">${Math.round(d.main.temp)}</div>
              <div class="temp-deg">°C</div>
            </div>
            <div class="condition">${d.weather[0].description}</div>
            <div class="feels-row">
              Feels like ${Math.round(d.main.feels_like)}°C
              <span class="sep">·</span>
              L ${d.main.temp_min.toFixed(1)}°
              <span class="sep">·</span>
              H ${d.main.temp_max.toFixed(1)}°
            </div>
          </div>

          <div class="card-stats">
            <div class="stats-grid">
              <div class="stat">
                <div class="stat-icon"><i class="ti ti-droplet"></i></div>
                <div class="stat-label">Humidity</div>
                <div class="stat-value">${d.main.humidity}<span class="stat-unit">%</span></div>
              </div>
              <div class="stat">
                <div class="stat-icon"><i class="ti ti-wind"></i></div>
                <div class="stat-label">Wind</div>
                <div class="stat-value">${windKmh}<span class="stat-unit"> km/h</span></div>
                <div class="stat-sub">${wDir}</div>
              </div>
              <div class="stat">
                <div class="stat-icon"><i class="ti ti-gauge"></i></div>
                <div class="stat-label">Pressure</div>
                <div class="stat-value">${d.main.pressure}<span class="stat-unit"> hPa</span></div>
              </div>
            </div>

            <div class="rule"></div>

            <div class="extras-grid">
              <div class="extra">
                <div class="extra-icon"><i class="ti ti-eye"></i></div>
                <div>
                  <div class="extra-label">Visibility</div>
                  <div class="extra-val">${visKm} km</div>
                </div>
              </div>
              <div class="extra">
                <div class="extra-icon"><i class="ti ti-cloud"></i></div>
                <div>
                  <div class="extra-label">Cloud cover</div>
                  <div class="extra-val">${d.clouds.all}%</div>
                </div>
              </div>
              <div class="extra">
                <div class="extra-icon"><i class="ti ti-sunrise"></i></div>
                <div>
                  <div class="extra-label">Sunrise</div>
                  <div class="extra-val">${sunrise}</div>
                </div>
              </div>
              <div class="extra">
                <div class="extra-icon"><i class="ti ti-sunset"></i></div>
                <div>
                  <div class="extra-label">Sunset</div>
                  <div class="extra-val">${sunset}</div>
                </div>
              </div>
            </div>
          </div>
        </div>`;

    } catch (e) {
      const msg = e.message.charAt(0).toUpperCase() + e.message.slice(1);
      err.textContent = msg + '. Try another city name.';
      result.innerHTML = `
        <div class="weather-card">
          <div class="placeholder">
            <div class="placeholder-icon"><i class="ti ti-map-off"></i></div>
            <p>No results found</p>
            <small>Check the spelling and try again</small>
          </div>
        </div>`;
    } finally {
      btn.innerHTML = '<i class="ti ti-search"></i> Search';
      btn.disabled = false;
    }
  }
</script>

</body>
</html>
